name: Daily Blog Post

on:
  schedule:
    # 07:15 UTC every day. Vercel will auto-deploy when the commit lands on main.
    - cron: '15 7 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-blog
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci --prefer-offline --no-audit

      - name: Generate post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run blog:generate

      - name: Commit and push
        run: |
          set -e
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git add content/blog
          if git diff --cached --quiet; then
            echo "No new post to commit."
            exit 0
          fi
          POST_FILE=$(git diff --cached --name-only | grep '^content/blog/.*\.md$' | head -n1)
          POST_TITLE=$(head -n5 "$POST_FILE" | grep -i '^title:' | sed -E 's/^title:[[:space:]]*"?([^"]+)"?.*/\1/')
          git commit -m "blog: ${POST_TITLE:-new daily post}"
          git push
